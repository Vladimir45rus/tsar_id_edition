name: tsar_id_edition
description: Царь-ID — кроссплатформенное приложение с Zero-Knowledge шифрованием.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cryptography: ^2.7.0
  argon2: ^1.0.1
  bip39: ^1.0.6
  crypto: ^3.0.6
  meta: ^1.12.0
  provider: ^6.1.2
  local_auth: ^2.3.0
  image_picker: ^1.1.2
  connectivity_plus: ^5.0.2
  http: ^1.2.2
  path_provider: ^2.1.4
  path: ^1.9.0
  vibration: ^2.0.1
  flutter_ringtone_player: ^4.0.0+4
  # camera: ^0.11.0+2
  permission_handler: ^11.3.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  archive: ^3.6.1
  share_plus: ^10.1.4
  file_picker: ^8.1.6
  flutter_dotenv: ^5.2.1
  screen_protector: ^1.4.2
  uuid: ^4.5.1
  sqflite_sqlcipher: ^3.2.0
  sqlcipher_flutter_libs: ^0.6.4
  camera: ^0.11.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
